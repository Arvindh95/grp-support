name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

# Only deploy when CI succeeded.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /opt/grp-chat
            sudo -u claudeuser git fetch origin
            sudo -u claudeuser git reset --hard origin/main
            # Best-effort dep install — keep going if pip changed nothing
            sudo -u claudeuser pip install --break-system-packages --user -r requirements.txt || true
            sudo systemctl restart grp-api grp-chat
            sleep 3
            curl -fsS http://127.0.0.1:8000/health
