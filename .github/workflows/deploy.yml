name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

# Only deploy when CI succeeded.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /opt/grp-chat
            sudo -u claudeuser git fetch origin
            sudo -u claudeuser git reset --hard origin/main

            # Backend deps (best-effort — keep going if pip changed nothing)
            sudo -u claudeuser pip install --break-system-packages --user -r requirements.txt || true

            # Frontend build (skip if no /web changes by checking package-lock.json mtime vs out/)
            if [ -d /opt/grp-chat/web ]; then
              cd /opt/grp-chat/web
              sudo -u claudeuser npm ci --silent --no-audit --no-fund
              sudo -u claudeuser npm run build
              # Atomically swap into the nginx-served dir
              sudo rm -rf /opt/grp-chat-web/*
              sudo cp -r out/. /opt/grp-chat-web/
              sudo chown -R www-data:www-data /opt/grp-chat-web 2>/dev/null || true
              cd /opt/grp-chat
            fi

            sudo systemctl restart grp-api
            sleep 3
            curl -fsS http://127.0.0.1:8000/health
            curl -fsSk -o /dev/null https://173.212.247.3.nip.io/login/
